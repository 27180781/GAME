<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON BREAKER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
    overflow: hidden;
  }
  h1 {
    font-size: 2rem;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 12px;
    color: #00ffff;
    text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
  }
  #hud {
    display: flex;
    gap: 40px;
    margin-bottom: 12px;
    font-size: 1rem;
    letter-spacing: 3px;
  }
  .hud-item span { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
  canvas {
    border: 1px solid #00ffff;
    box-shadow: 0 0 30px #00ffff44, inset 0 0 30px #00000088;
    cursor: none;
  }
  #msg {
    margin-top: 14px;
    font-size: 0.85rem;
    color: #ffffff88;
    letter-spacing: 2px;
  }
  #overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  #overlay h2 {
    font-size: 3rem;
    letter-spacing: 6px;
    text-shadow: 0 0 30px currentColor;
  }
  #overlay p { margin-top: 10px; font-size: 1rem; letter-spacing: 2px; color: #aaa; }
</style>
</head>
<body>
<h1>⚡ NEON BREAKER ⚡</h1>
<div id="hud">
  <div class="hud-item">SCORE: <span id="score">0</span></div>
  <div class="hud-item">LEVEL: <span id="level">1</span></div>
  <div class="hud-item">LIVES: <span id="lives">❤❤❤</span></div>
</div>
<canvas id="c" width="600" height="500"></canvas>
<div id="msg">MOUSE or ← → to move &nbsp;|&nbsp; SPACE to launch</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Game state
let state = 'start'; // start, play, dead, win, over
let score = 0, lives = 3, level = 1;
let particles = [], powerups = [];

// Paddle
const paddle = { w: 90, h: 12, x: W/2 - 45, y: H - 30, speed: 0, color: '#00ffff' };

// Ball
function makeBall() {
  return { x: W/2, y: H - 50, vx: (Math.random() * 2 - 1) * 3, vy: -4, r: 7, active: false, color: '#ffffff' };
}
let balls = [makeBall()];

// Bricks
const COLS = 10, ROWS = 6;
const BW = 50, BH = 18, GAP = 4;
const BOFF_X = (W - (COLS * (BW + GAP) - GAP)) / 2;
const BOFF_Y = 50;
const COLORS = ['#ff0055','#ff6600','#ffcc00','#00ff88','#00ccff','#aa00ff'];
const GLOW =   ['#ff005588','#ff660088','#ffcc0088','#00ff8888','#00ccff88','#aa00ff88'];

let bricks = [];
function makeBricks() {
  bricks = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let hp = (level >= 3 && r < 2) ? 2 : 1;
      bricks.push({
        x: BOFF_X + c * (BW + GAP),
        y: BOFF_Y + r * (BH + GAP),
        w: BW, h: BH,
        hp, maxHp: hp,
        ci: r % COLORS.length,
        alive: true
      });
    }
  }
}

// Powerup types
const PU_TYPES = [
  { id:'wide',   color:'#00ffcc', glyph:'⬛', label:'WIDE' },
  { id:'multi',  color:'#ff00ff', glyph:'✦',  label:'MULTI' },
  { id:'fast',   color:'#ff4400', glyph:'⚡',  label:'SPEED' },
  { id:'slow',   color:'#0088ff', glyph:'❄',  label:'SLOW' },
  { id:'life',   color:'#ff0044', glyph:'❤',  label:'+LIFE' },
];

// Particles
function burst(x, y, color, n=12) {
  for (let i = 0; i < n; i++) {
    let angle = Math.random() * Math.PI * 2;
    let speed = Math.random() * 4 + 1;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 1, decay: Math.random()*0.03+0.02, r: Math.random()*3+1, color });
  }
}

// Input
let keys = {};
let mouseX = W/2;
canvas.addEventListener('mousemove', e => {
  let rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});
canvas.addEventListener('click', launch);
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); launch(); }
  if (state === 'start' || state === 'dead' || state === 'win') start();
});
document.addEventListener('keyup', e => keys[e.code] = false);

function launch() {
  if (state === 'start' || state === 'dead' || state === 'win') { start(); return; }
  balls.forEach(b => { if (!b.active) { b.active = true; b.vy = -(3.5 + level*0.3); b.vx = (Math.random()*2-1)*3; } });
}

function start() {
  if (state === 'over') { score=0; lives=3; level=1; }
  state = 'play';
  paddle.w = 90;
  balls = [makeBall()];
  powerups = [];
  particles = [];
  makeBricks();
  updateHUD();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lives').textContent = '❤'.repeat(lives);
}

// Powerup effects
let wideTimer = 0, slowTimer = 0;

function applyPowerup(type) {
  if (type === 'wide') { paddle.w = 140; wideTimer = 300; }
  if (type === 'slow') { balls.forEach(b => { b.vx *= 0.7; b.vy *= 0.7; }); slowTimer = 200; }
  if (type === 'fast') { balls.forEach(b => { b.vx *= 1.3; b.vy = Math.sign(b.vy) * Math.min(Math.abs(b.vy*1.3), 12); }); }
  if (type === 'multi') {
    let newBalls = [];
    balls.forEach(b => {
      if (!b.active) return;
      [-1,1].forEach(d => {
        let nb = {...b, vx: b.vx + d*2, color: '#ff00ff'};
        newBalls.push(nb);
      });
    });
    balls.push(...newBalls.slice(0,4));
  }
  if (type === 'life') { lives = Math.min(lives+1, 5); updateHUD(); }
}

// Collision helpers
function circleRect(ball, rect) {
  let cx = Math.max(rect.x, Math.min(ball.x, rect.x + rect.w));
  let cy = Math.max(rect.y, Math.min(ball.y, rect.y + rect.h));
  return (ball.x-cx)**2 + (ball.y-cy)**2 < ball.r**2;
}

// Main loop
let last = 0;
function loop(ts) {
  let dt = Math.min((ts - last) / 16.67, 3);
  last = ts;
  ctx.clearRect(0, 0, W, H);
  drawBg();

  if (state === 'play') update(dt);

  drawBricks();
  drawPowerups();
  drawPaddle();
  drawBalls();
  drawParticles();

  if (state !== 'play') drawOverlay();

  requestAnimationFrame(loop);
}

function drawBg() {
  // subtle grid
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function update(dt) {
  // Paddle
  let target = mouseX - paddle.w/2;
  if (keys['ArrowLeft'])  target = paddle.x - 8*dt;
  if (keys['ArrowRight']) target = paddle.x + 8*dt;
  paddle.x += (target - paddle.x) * 0.25;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

  // Timers
  if (wideTimer > 0) { wideTimer -= dt; if (wideTimer <= 0) paddle.w = 90; }
  if (slowTimer > 0) slowTimer -= dt;

  // Balls
  balls.forEach(b => {
    if (!b.active) {
      b.x = paddle.x + paddle.w/2;
      b.y = paddle.y - b.r - 2;
      return;
    }
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // Walls
    if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx); burst(b.x, b.y, '#ffffff44', 4); }
    if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx); burst(b.x, b.y, '#ffffff44', 4); }
    if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy); burst(b.x, b.y, '#ffffff44', 4); }

    // Paddle
    if (circleRect(b, paddle) && b.vy > 0) {
      b.vy = -Math.abs(b.vy);
      let hit = (b.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
      b.vx = hit * 5;
      b.color = `hsl(${Math.random()*360},100%,70%)`;
      burst(b.x, paddle.y, '#00ffff', 6);
    }

    // Bricks
    for (let br of bricks) {
      if (!br.alive) continue;
      if (circleRect(b, br)) {
        br.hp--;
        if (br.hp <= 0) {
          br.alive = false;
          score += 10 * level;
          burst(br.x + br.w/2, br.y + br.h/2, COLORS[br.ci], 16);
          // Chance of powerup
          if (Math.random() < 0.12) {
            let pt = PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
            powerups.push({ x: br.x+br.w/2, y: br.y+br.h/2, vy: 2, r: 10, type: pt, alive: true });
          }
        } else {
          burst(br.x + br.w/2, br.y + br.h/2, '#ffffff', 5);
        }
        // Bounce
        let bCenterX = br.x + br.w/2, bCenterY = br.y + br.h/2;
        let dx = b.x - bCenterX, dy = b.y - bCenterY;
        if (Math.abs(dx/br.w) > Math.abs(dy/br.h)) b.vx = -b.vx;
        else b.vy = -b.vy;
        updateHUD();
        break;
      }
    }
  });

  // Remove dead balls
  let activeBefore = balls.filter(b=>b.active).length;
  balls = balls.filter(b => b.y - b.r < H + 20);
  let activeAfter = balls.filter(b=>b.active).length;
  if (activeBefore > 0 && activeAfter === 0) {
    lives--;
    updateHUD();
    if (lives <= 0) { state = 'over'; return; }
    balls.push(makeBall());
    state = 'dead';
    setTimeout(() => { if (state==='dead') { state='play'; } }, 1500);
  }

  // Powerups
  powerups.forEach(p => {
    if (!p.alive) return;
    p.y += p.vy * dt;
    if (p.y > H + 20) { p.alive = false; return; }
    let px = paddle.x, py = paddle.y;
    if (Math.abs(p.x - (px+paddle.w/2)) < paddle.w/2 + p.r && Math.abs(p.y - py) < paddle.h + p.r) {
      applyPowerup(p.type.id);
      burst(p.x, p.y, p.type.color, 20);
      p.alive = false;
    }
  });
  powerups = powerups.filter(p => p.alive);

  // Particles
  particles.forEach(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 0.08 * dt;
    p.life -= p.decay * dt;
  });
  particles = particles.filter(p => p.life > 0);

  // Win check
  if (bricks.every(b => !b.alive)) {
    level++;
    if (level > 5) { state = 'win'; return; }
    score += 100 * level;
    updateHUD();
    state = 'play';
    paddle.w = 90;
    balls = [makeBall()];
    powerups = [];
    makeBricks();
  }
}

function drawBricks() {
  bricks.forEach(b => {
    if (!b.alive) return;
    let alpha = b.hp / b.maxHp;
    ctx.save();
    ctx.shadowColor = COLORS[b.ci];
    ctx.shadowBlur = 10 * alpha;
    ctx.fillStyle = COLORS[b.ci] + Math.round(alpha * 255).toString(16).padStart(2,'0');
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = COLORS[b.ci];
    ctx.lineWidth = 1;
    ctx.strokeRect(b.x+0.5, b.y+0.5, b.w-1, b.h-1);
    ctx.restore();
    if (b.maxHp > 1) {
      ctx.fillStyle = '#ffffff88';
      ctx.font = 'bold 10px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(b.hp, b.x+b.w/2, b.y+b.h/2+4);
    }
  });
}

function drawPaddle() {
  ctx.save();
  ctx.shadowColor = paddle.color;
  ctx.shadowBlur = 20;
  let grd = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y+paddle.h);
  grd.addColorStop(0, '#00ffff');
  grd.addColorStop(1, '#0088ff');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
  ctx.fill();
  ctx.restore();
}

function drawBalls() {
  balls.forEach(b => {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 15;
    let grd = ctx.createRadialGradient(b.x-2, b.y-2, 1, b.x, b.y, b.r);
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(1, b.color);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawPowerups() {
  powerups.forEach(p => {
    ctx.save();
    ctx.shadowColor = p.type.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = p.type.color + '33';
    ctx.strokeStyle = p.type.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(p.type.glyph, p.x, p.y+4);
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawOverlay() {
  ctx.fillStyle = '#0a0a0f99';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  if (state === 'start') {
    ctx.save();
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#00ffff';
    ctx.font = 'bold 48px Courier New';
    ctx.fillText('NEON BREAKER', W/2, H/2 - 30);
    ctx.restore();
    ctx.fillStyle = '#ffffff88';
    ctx.font = '16px Courier New';
    ctx.fillText('CLICK or SPACE to start', W/2, H/2 + 20);
    ctx.fillText('Mouse or ← → to move', W/2, H/2 + 45);
  }
  if (state === 'dead') {
    ctx.save();
    ctx.shadowColor = '#ff0055';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#ff0055';
    ctx.font = 'bold 36px Courier New';
    ctx.fillText('LOST A LIFE!', W/2, H/2);
    ctx.restore();
  }
  if (state === 'over') {
    ctx.save();
    ctx.shadowColor = '#ff0055';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#ff0055';
    ctx.font = 'bold 48px Courier New';
    ctx.fillText('GAME OVER', W/2, H/2 - 30);
    ctx.restore();
    ctx.fillStyle = '#ffcc00';
    ctx.font = '22px Courier New';
    ctx.fillText(`SCORE: ${score}`, W/2, H/2 + 15);
    ctx.fillStyle = '#ffffff66';
    ctx.font = '14px Courier New';
    ctx.fillText('CLICK or SPACE to restart', W/2, H/2 + 50);
  }
  if (state === 'win') {
    ctx.save();
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 48px Courier New';
    ctx.fillText('YOU WIN!', W/2, H/2 - 30);
    ctx.restore();
    ctx.fillStyle = '#ffcc00';
    ctx.font = '22px Courier New';
    ctx.fillText(`FINAL SCORE: ${score}`, W/2, H/2 + 15);
    ctx.fillStyle = '#ffffff66';
    ctx.font = '14px Courier New';
    ctx.fillText('CLICK or SPACE to play again', W/2, H/2 + 50);
  }
}

canvas.addEventListener('click', () => {
  if (state === 'start' || state === 'over' || state === 'win') start();
});
document.addEventListener('keydown', e => {
  if (['Space','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});

requestAnimationFrame(loop);
</script>
</body>
</html>
